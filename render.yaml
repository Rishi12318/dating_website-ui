services:
  # Backend - Django API
  - type: web
    name: lovelle-backend
    runtime: python
    buildCommand: cd backend && pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate && python manage.py seed_questions
    startCommand: cd backend && gunicorn lovelle.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: "dating-website-ui-1.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://dating-website-ui.vercel.app,https://dating-website-ui-1.onrender.com,http://localhost:3000"
      - key: GROQ_API_KEY
        sync: false
      - key: EMAIL_BACKEND
        value: "django.core.mail.backends.console.EmailBackend"
      - key: DEFAULT_FROM_EMAIL
        value: "noreply@lovelle.com"
      - key: WEB_CONCURRENCY
        value: "4"

  # Frontend - Next.js
  - type: web
    name: lovelle-frontend
    runtime: node
    buildCommand: cd dating-frontend && npm install && npm run build
    startCommand: cd dating-frontend && npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: "https://dating-website-ui-1.onrender.com/api/v1"
      - key: NODE_ENV
        value: "production"

databases:
  - name: lovelle-db
    plan: free
    databaseName: lovelle
