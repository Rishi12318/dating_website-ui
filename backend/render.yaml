services:
  - type: web
    name: lovelle-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn lovelle.wsgi:application
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: "lovelle-backend.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: lovelle-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: "https://dating-website-ui.onrender.com"
      - key: GROQ_API_KEY
        sync: false
      - key: EMAIL_BACKEND
        value: "django.core.mail.backends.console.EmailBackend"
      - key: WEB_CONCURRENCY
        value: "4"

databases:
  - name: lovelle-db
    plan: free
    databaseName: lovelle
